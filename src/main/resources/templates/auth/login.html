<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="page-shell" style="max-width: 480px">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h4 mb-3">Sign in</h1>
      <div th:replace="~{fragments/alerts :: alerts}"></div>
      <div th:if="${param.error}" class="alert alert-danger">Invalid email or password.</div>
      <div th:if="${param.logout}" class="alert alert-success">You have signed out.</div>
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Sign in</button>
      </form>
      <p class="mt-3 mb-0">No account? <a th:href="@{/register}">Register</a></p>
    </div>
  </div>
</main>
</body>
</html>
