<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="page-shell" style="max-width: 520px">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h4 mb-3">Create account</h1>
      <div th:replace="~{fragments/alerts :: alerts}"></div>
      <form th:action="@{/register}" th:object="${registerDto}" method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input class="form-control" th:field="*{name}">
          <div class="text-danger small" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" th:field="*{email}">
          <div class="text-danger small" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" th:field="*{password}">
          <div class="text-danger small" th:errors="*{password}"></div>
        </div>
        <button class="btn btn-primary w-100" type="submit">Register</button>
      </form>
      <p class="mt-3 mb-0">Already registered? <a th:href="@{/login}">Sign in</a></p>
    </div>
  </div>
</main>
</body>
</html>
