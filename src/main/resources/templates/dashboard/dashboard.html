<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell">
  <div th:replace="~{fragments/alerts :: alerts}"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h3 mb-1">Dashboard</h1>
      <p class="text-muted mb-0" th:text="'Welcome, ' + ${user.name}"></p>
    </div>
    <a class="btn btn-primary" th:href="@{/topics/new}">Request topic</a>
  </div>
  <div class="dashboard-grid">
    <section class="card dashboard-card"><div class="card-body">
      <h2 class="h5">Requested by me</h2>
      <div th:if="${#lists.isEmpty(requested)}" class="text-muted">No requests yet.</div>
      <a th:each="t : ${requested}" class="d-block" th:href="@{/topics/{id}(id=${t.id})}" th:text="${t.title}"></a>
    </div></section>
    <section class="card dashboard-card"><div class="card-body">
      <h2 class="h5">Speaking</h2>
      <div th:if="${#lists.isEmpty(speaking)}" class="text-muted">No speaking sessions.</div>
      <a th:each="t : ${speaking}" class="d-block" th:href="@{/topics/{id}(id=${t.id})}" th:text="${t.title}"></a>
    </div></section>
    <section class="card dashboard-card"><div class="card-body">
      <h2 class="h5">Enrolled</h2>
      <div th:if="${#lists.isEmpty(enrollments)}" class="text-muted">No enrollments.</div>
      <a th:each="e : ${enrollments}" class="d-block" th:href="@{/topics/{id}(id=${e.topic.id})}" th:text="${e.topic.title}"></a>
    </div></section>
    <section class="card dashboard-card"><div class="card-body">
      <h2 class="h5">Rated</h2>
      <div th:if="${#lists.isEmpty(ratings)}" class="text-muted">No ratings yet.</div>
      <a th:each="r : ${ratings}" class="d-block" th:href="@{/topics/{id}(id=${r.topic.id})}" th:text="${r.topic.title + ' - ' + r.stars + '/5'}"></a>
    </div></section>
  </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
