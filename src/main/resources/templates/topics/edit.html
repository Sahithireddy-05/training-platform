<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Topic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell" style="max-width: 780px">
  <div class="page-header">
    <div>
      <div class="page-kicker">Open topic</div>
      <h1 class="page-title">Edit topic</h1>
      <p class="page-subtitle">Requests can be edited only before someone claims them.</p>
    </div>
  </div>
  <form class="card" th:action="@{/topics/{id}/edit(id=${topic.id})}" th:object="${topicUpdateDto}" method="post">
    <div class="card-body p-4">
      <div class="mb-3"><label class="form-label">Title</label><input class="form-control" th:field="*{title}"><div class="text-danger small" th:errors="*{title}"></div></div>
      <div class="mb-3"><label class="form-label">Description</label><textarea rows="6" class="form-control" th:field="*{description}"></textarea></div>
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-link" th:href="@{/topics/{id}(id=${topic.id})}">Cancel</a>
    </div>
  </form>
</main>
</body>
</html>
