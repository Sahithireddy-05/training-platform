<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Most Wanted</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell">
  <div class="page-header">
    <div>
      <div class="page-kicker">Demand signal</div>
      <h1 class="page-title">Most Wanted</h1>
      <p class="page-subtitle">Open and claimed topics ranked by team recommendations.</p>
    </div>
  </div>
  <div class="row g-3">
    <div class="col-md-6 col-xl-4" th:each="t : ${topics.content}">
      <a class="list-tile h-100" th:href="@{/topics/{id}(id=${t.id})}">
        <div class="d-flex justify-content-between gap-3">
          <strong th:text="${t.title}"></strong>
          <span class="badge badge-status" th:classappend="${'status-' + t.status}" th:text="${t.status}"></span>
        </div>
        <p class="text-muted my-2" th:text="${#strings.abbreviate(t.description, 110)}"></p>
        <div class="metric-label" th:text="${t.recommendationCount + ' recommendations'}"></div>
      </a>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(topics.content)}" class="soft-panel text-center text-muted">No wanted topics yet.</div>
  <div th:replace="~{fragments/pagination :: pager(${topics}, '/topics/most-wanted')}"></div>
</main>
</body>
</html>
