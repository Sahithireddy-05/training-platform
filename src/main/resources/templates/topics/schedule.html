<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell" style="max-width: 780px">
  <div class="page-header">
    <div>
      <div class="page-kicker">Speaker tools</div>
      <h1 class="page-title">Schedule session</h1>
      <p class="page-subtitle" th:text="${topic.title}"></p>
    </div>
  </div>
  <form class="card" th:action="@{/topics/{id}/schedule(id=${topic.id})}" th:object="${scheduleDto}" method="post">
    <div class="card-body p-4">
      <div class="mb-3"><label class="form-label">Date and time</label><input id="scheduledAt" class="form-control" type="datetime-local" th:field="*{scheduledAt}"><div class="text-danger small" th:errors="*{scheduledAt}"></div></div>
      <div class="mb-3"><label class="form-label">Duration minutes</label><input class="form-control" type="number" min="1" th:field="*{durationMinutes}"><div class="text-danger small" th:errors="*{durationMinutes}"></div></div>
      <div class="mb-3"><label class="form-label">Location</label><input class="form-control" th:field="*{location}"><div class="text-danger small" th:errors="*{location}"></div></div>
      <div class="mb-3"><label class="form-label">Capacity</label><input class="form-control" type="number" min="1" th:field="*{capacity}"><div class="form-text">Leave blank for no cap.</div><div class="text-danger small" th:errors="*{capacity}"></div></div>
      <button class="btn btn-primary" type="submit">Save schedule</button>
      <button class="btn btn-outline-secondary" type="button" onclick="setNowPlusOneHour('scheduledAt')">Use one hour from now</button>
      <a class="btn btn-link" th:href="@{/topics/{id}(id=${topic.id})}">Cancel</a>
    </div>
  </form>
</main>
<script th:src="@{/js/topic.js}"></script>
</body>
</html>
