<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Past</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body><div th:replace="~{fragments/navbar :: navbar}"></div><main class="page-shell"><h1 class="h3 mb-3">Past Sessions</h1><div class="list-group"><a th:each="t : ${topics.content}" class="list-group-item list-group-item-action d-flex justify-content-between" th:href="@{/topics/{id}(id=${t.id})}"><span><strong th:text="${t.title}"></strong><span class="d-block text-muted" th:text="${#temporals.format(t.scheduledAt, 'dd MMM yyyy HH:mm')}"></span></span><span th:text="${#numbers.formatDecimal(t.averageRating, 1, 1) + ' / 5'}"></span></a></div><div th:replace="~{fragments/pagination :: pager(${topics}, '/topics/past')}"></div></main></body></html>
