<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Past</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell">
  <div class="page-header">
    <div>
      <div class="page-kicker">History</div>
      <h1 class="page-title">Past Sessions</h1>
      <p class="page-subtitle">Completed sessions with rating signal and attendance history.</p>
    </div>
  </div>
  <div class="row g-3">
    <div class="col-md-6" th:each="t : ${topics.content}">
      <a class="list-tile h-100" th:href="@{/topics/{id}(id=${t.id})}">
        <div class="d-flex justify-content-between gap-3">
          <strong th:text="${t.title}"></strong>
          <span class="fw-bold" th:text="${#numbers.formatDecimal(t.averageRating, 1, 1) + ' / 5'}"></span>
        </div>
        <div class="text-muted mt-2" th:text="${#temporals.format(t.scheduledAt, 'dd MMM yyyy HH:mm')}"></div>
        <div class="metric-label mt-2" th:text="${t.ratings.size() + ' ratings'}"></div>
      </a>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(topics.content)}" class="soft-panel text-center text-muted">No completed sessions yet.</div>
  <div th:replace="~{fragments/pagination :: pager(${topics}, '/topics/past')}"></div>
</main>
</body>
</html>
