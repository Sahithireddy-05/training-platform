<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell">
  <div th:replace="~{fragments/alerts :: alerts}"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">Topics</h1>
    <a class="btn btn-primary" th:href="@{/topics/new}">Request topic</a>
  </div>
  <form class="row g-2 mb-3" method="get" th:action="@{/topics}">
    <div class="col-md-3">
      <select class="form-select" name="status">
        <option value="">All statuses</option>
        <option th:each="s : ${statuses}" th:value="${s}" th:selected="${status == s.name()}" th:text="${s}"></option>
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select" name="role">
        <option value="">All roles</option>
        <option value="requested" th:selected="${role == 'requested'}">Requested by me</option>
        <option value="speaking" th:selected="${role == 'speaking'}">Speaking</option>
        <option value="enrolled" th:selected="${role == 'enrolled'}">Enrolled</option>
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select" name="sort">
        <option value="createdAt" th:selected="${sort == 'createdAt'}">Created at</option>
        <option value="recommendations" th:selected="${sort == 'recommendations'}">Recommendation count</option>
        <option value="scheduledAt" th:selected="${sort == 'scheduledAt'}">Scheduled at</option>
      </select>
    </div>
    <div class="col-md-3"><button class="btn btn-outline-primary w-100" type="submit">Apply</button></div>
  </form>
  <div class="table-responsive card">
    <table class="table table-hover mb-0">
      <thead><tr><th>Topic</th><th>Status</th><th>Requester</th><th>Speaker</th><th>Recs</th><th>Scheduled</th></tr></thead>
      <tbody>
      <tr th:each="t : ${topics.content}">
        <td><a th:href="@{/topics/{id}(id=${t.id})}" th:text="${t.title}"></a></td>
        <td><span class="badge bg-secondary badge-status" th:text="${t.status}"></span></td>
        <td th:text="${t.requester.name}"></td>
        <td th:text="${t.speaker == null ? '-' : t.speaker.name}"></td>
        <td th:text="${t.recommendationCount}"></td>
        <td th:text="${t.scheduledAt == null ? '-' : #temporals.format(t.scheduledAt, 'dd MMM yyyy HH:mm')}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(topics.content)}"><td colspan="6" class="text-center text-muted py-4">No topics found.</td></tr>
      </tbody>
    </table>
  </div>
  <div th:replace="~{fragments/pagination :: pager(${topics}, '/topics')}"></div>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
