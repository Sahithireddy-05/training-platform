<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Request Topic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell" style="max-width: 760px">
  <h1 class="h3 mb-3">Request a topic</h1>
  <form class="card" th:action="@{/topics}" th:object="${topicCreateDto}" method="post">
    <div class="card-body">
      <div class="mb-3"><label class="form-label">Title</label><input class="form-control" th:field="*{title}"><div class="text-danger small" th:errors="*{title}"></div></div>
      <div class="mb-3"><label class="form-label">Description</label><textarea rows="6" class="form-control" th:field="*{description}"></textarea></div>
      <button class="btn btn-primary" type="submit">Create request</button>
      <a class="btn btn-link" th:href="@{/topics}">Cancel</a>
    </div>
  </form>
</main>
</body>
</html>
